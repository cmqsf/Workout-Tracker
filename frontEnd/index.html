<!DOCTYPE html>

<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
        <title>Front end learning: Workout Tracker</title>

        <!-- Link to fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single+Ink:wght@100..900&family=Gruppo&display=swap" rel="stylesheet">

        <!-- Link to css -->
        <link rel="stylesheet" href = "/css/main-elements.css">
        <link rel="stylesheet" href = "/css/header-elements.css">
        <link rel="stylesheet" href = "/css/button-elements.css">
    </head>

    <body>
        <header>
            <a href="/" style="text-decoration: none; color: inherit">
                <h1 id="home-header">Workout Tracker</h1>
            </a>
        </header>
        <main>
            <div id="login-button">
                <button onclick="window.location.href='login.html'">
                    <strong>Log In</strong>
                </button>
            </div>
            <div id="get-started">
                <button onclick="window.location.href='createUser.html'">
                    <strong>Get Started</strong>
                </button>
            </div>
            <div id="logged-in-options" style="display:none;">
                <button>Log a Workout</button>
                <button>View My Stats</button>
            </div>
            <script>
                const token = localStorage.getItem("token")
                if (token) {
                    document.getElementById("logged-in-options").style.display = "block";
                }
            </script>
        </main>
    </body>
</html>
