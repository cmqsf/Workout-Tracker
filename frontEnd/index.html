<!DOCTYPE html>

<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
        <title>Front end learning: Workout Tracker</title>

        <!-- Link to fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single+Ink:wght@100..900&family=Gruppo&display=swap" rel="stylesheet">

        <!-- Link to css -->
        <link rel="stylesheet" href = "/css/main-elements.css">
        <link rel="stylesheet" href = "/css/header-elements.css">
        <link rel="stylesheet" href = "/css/button-elements.css">
        

        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
        <link rel="manifest" href="/site.webmanifest">
    </head>

    <body>
        <header id = "main-header">
            <a href="/" style="text-decoration: none; color: inherit">
                <h1 id="home-header">Workout Tracker</h1>
            </a>
        </header>
        <main>
            <div id="login-button">
                <button onclick="window.location.href='login.html'">
                    <strong>Log In</strong>
                </button>
            </div>
            <div id="get-started">
                <button onclick="window.location.href='createUser.html'">
                    <strong>Get Started</strong>
                </button>
            </div>

            <h1 id="greeting" style="display: none;"></h1>
            <script>
                function logout() {
                    localStorage.removeItem("token");
                    localStorage.removeItem("fn");
                    window.location.href = "/";
                }
            </script>
            <div id="logged-in-options" style="display:none;">
                <button>Log a Workout</button>
                <button>View My Stats</button>
                <button onclick="logout()">Log Out</button>
            </div>
            <script>
                function isTokenExpired(token) {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    return payload.exp*1000 < Date.now();
                }

                const token = localStorage.getItem("token")
                if (token && !isTokenExpired(token)) {
                    document.getElementById("main-header").style.display = "none";
                    document.getElementById("logged-in-options").style.display = "block";
                    document.getElementById("login-button").style.display = "none";
                    document.getElementById("get-started").style.display = "none"; 

                    const fn = localStorage.getItem("fn")
                    if (fn) {
                        const greeting = document.getElementById("greeting");
                        greeting.textContent = `Welcome back ${fn}!`;
                        greeting.style.display = "block";
                    } else {
                        localStorage.removeItem("token");
                        localStorage.removeItem("fn");
                    }
                } 

            </script>
        </main>
    </body>
</html>
