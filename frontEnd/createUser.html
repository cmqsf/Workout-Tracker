
<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single+Ink:wght@100..900&family=Gruppo&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="/css/main-elements.css">
        <link rel="stylesheet" href = "/css/header-elements.css">
        <link rel="stylesheet" href = "/css/button-elements.css">
        <link rel="stylesheet" href = "/css/form-elements/create-user.css">
    </head>
    
    <body>
        <header>
            <a href="/" style="text-decoration: none; color: inherit">
                <h1 id="home-header">Workout Tracker</h1>
            </a>
        </header>
        <div id="error-message" style="display:none; color:rgb(255, 174, 0);">
            Something went wrong.
        </div>
        <div id="auth-box">
            <input type="text" id="email" placeholder="Email" required/>
            <input type="text" id="username" placeholder="Username" required/>
            <input type="password" id="password" placeholder="Password" required/>
        </div>
        <div id="basic-info">
            <input type="text" id="fn" placeholder="First Name" required/>
            <input type="text" id="ln" placeholder="Last Name"/>
            <input type="number" id="year" step="1" placeholder="Birth Year" required/>
            <input type="number" id="month" step="1" placeholder="Birth Month" min="1" max="12" required/>
            <input type="number" id="day" step="1" placeholder="Birth Day" min="1" max="31" required/>
        </div>
        <div id="optional-info">
            <input type="number" id="height" placeholder="Height in cms"/>
            <input type="number" id="weight" placeholder="Weight in kgs"/>
        </div>
        
        <script src="js/config.js"></script>
        <script src="js/createUserForm.js"></script>

        <button onclick="createUser()">
            Create User
        </button>
            
    </body>
</html>
